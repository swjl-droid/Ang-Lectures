/* Icône représentant la partie du voyage à un chapitre donné.
   Utilise les "bands" définies par le livre si présentes, sinon retombe sur la couverture du livre. */
function vehicleForChapter(book, num) {
  const bands = (book && book.bands) || [];
  const b = bands.find((band) => num >= band.start && num <= band.end);
  if (b) return b.emoji;
  return (book && book.cover) || "🧭";
}

function shuffleArray(arr) {
  const a = arr.map((v, i) => ({ v, i }));
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function starsForScore(score, max) {
  const pct = max > 0 ? score / max : 0;
  if (pct >= 0.85) return 3;
  if (pct >= 0.6) return 2;
  if (pct >= 0.35) return 1;
  return 0;
}

function pick(arr) {

}

function dayKey(ts) {
  return new Date(ts).toISOString().slice(0, 10);
}

/* Calcule le "streak" : nombre de jours consécutifs de lecture, en comptant
   à rebours depuis aujourd'hui (ou hier, pour ne pas casser le streak avant minuit). */
function computeStreak(activeDaysSet) {
  if (activeDaysSet.size === 0) return 0;
  const oneDay = 24 * 60 * 60 * 1000;
  const days = Array.from(activeDaysSet).sort().reverse();
  const todayDate = new Date(dayKey(Date.now()) + "T00:00:00");
  const mostRecentDate = new Date(days[0] + "T00:00:00");
  const gapFromToday = Math.round((todayDate - mostRecentDate) / oneDay);
  if (gapFromToday > 1) return 0; // dernière lecture il y a plus d'un jour : streak rompu

  let streak = 1;
  let cursor = mostRecentDate;
  for (let i = 1; i < days.length; i++) {
    const d = new Date(days[i] + "T00:00:00");
    const diff = Math.round((cursor - d) / oneDay);
    if (diff === 1) {
      streak++;
      cursor = d;
    } else if (diff !== 0) {
      break;
    }
  }
  return streak;
}

/* Calcule toutes les statistiques de la page d'accueil à partir de la progression sauvegardée. */
function computeHomeStats(progress, books) {
  let minutesFR = 0, minutesEN = 0;
  let booksDoneFR = 0, booksDoneEN = 0;
  const activeDaysAll = new Set();
  const activeDaysFR = new Set();
  const activeDaysEN = new Set();

  books.forEach((book) => {
    const bp = progress[book.id] || {};
    const entries = Object.entries(bp);
    const chapterCount = book.chapters.length;
    let bookMinutes = 0;

    entries.forEach(([chapterNumStr, entry]) => {
      const ch = book.chapters.find((c) => String(c.num) === String(chapterNumStr));
      const minutes = ch ? parseInt(ch.time, 10) || 0 : 0;
      bookMinutes += minutes;
      if (entry && entry.date) {
        const key = dayKey(entry.date);
        activeDaysAll.add(key);
        if (book.language === "fr") activeDaysFR.add(key);
        if (book.language === "en") activeDaysEN.add(key);
      }
    });

    if (book.language === "fr") {
      minutesFR += bookMinutes;
      if (chapterCount > 0 && entries.length === chapterCount) booksDoneFR++;
    } else if (book.language === "en") {
      minutesEN += bookMinutes;
      if (chapterCount > 0 && entries.length === chapterCount) booksDoneEN++;
    }
  });

  return {
    streak: computeStreak(activeDaysAll),
    hoursFR: minutesFR / 60,
    hoursEN: minutesEN / 60,
    booksFR: booksDoneFR,
    booksEN: booksDoneEN,
    avgMinFR: activeDaysFR.size > 0 ? minutesFR / activeDaysFR.size : 0,
    avgMinEN: activeDaysEN.size > 0 ? minutesEN / activeDaysEN.size : 0,
  };
}

/* Fusionne des données importées avec la progression locale, en gardant le meilleur score
   en cas de conflit sur un même chapitre — utilisé par la fonction Importer. */
function mergeProgress(local, imported) {
  const result = {};
  Object.keys(local || {}).forEach((bookId) => { result[bookId] = { ...local[bookId] }; });
  Object.keys(imported || {}).forEach((bookId) => {
    result[bookId] = { ...(result[bookId] || {}) };
    Object.keys(imported[bookId]).forEach((chNum) => {
      const incoming = imported[bookId][chNum];
      const existing = result[bookId][chNum];
      if (!existing || (incoming.score || 0) > (existing.score || 0)) {
        result[bookId][chNum] = incoming;
      }
    });
  });
  return result;
}

function getNodePositions(n) {
  const perRow = 6;
  const xs = [11, 26.6, 42.2, 57.8, 73.4, 89];
  const rowGap = 12.6;
  const positions = [];
  for (let i = 0; i < n; i++) {
    const row = Math.floor(i / perRow);
    let col = i % perRow;
    if (row % 2 === 1) col = perRow - 1 - col;
    positions.push({ x: xs[col], y: 9 + row * rowGap });
  }
  return positions;
}

/* Valide qu'un objet JSON respecte le format attendu pour un livre.
   Retourne { ok:true } ou { ok:false, errors:[...] }. */
function validateBookPackage(data) {
  const errors = [];
  if (!data || typeof data !== "object") return { ok: false, errors: ["Le contenu n'est pas un objet JSON valide."] };
  ["id", "title", "author", "language", "chapters"].forEach((f) => {
    if (!data[f]) errors.push(`Champ manquant : "${f}".`);
  });
  if (data.id && !/^[a-z0-9-]+$/.test(data.id)) errors.push('Le champ "id" doit être en minuscules, chiffres et tirets uniquement (ex. "20000-lieues").');
  if (data.language && data.language !== "fr" && data.language !== "en") errors.push('Le champ "language" doit valoir "fr" ou "en".');
  if (!Array.isArray(data.chapters) || data.chapters.length === 0) {
    errors.push('Le champ "chapters" doit être un tableau non vide.');
  } else {
    data.chapters.forEach((ch, i) => {
      const where = `Chapitre ${i + 1}`;
      if (typeof ch.num !== "number") errors.push(`${where} : "num" manquant ou invalide.`);
      if (!ch.title) errors.push(`${where} : "title" manquant.`);
      if (!ch.time) errors.push(`${where} : "time" manquant (ex. "10 min").`);
      if (!Array.isArray(ch.qcm) || ch.qcm.length !== 4) errors.push(`${where} : "qcm" doit contenir exactement 4 questions.`);
      if (!Array.isArray(ch.vf) || ch.vf.length !== 4) errors.push(`${where} : "vf" doit contenir exactement 4 affirmations.`);
      if (!Array.isArray(ch.chrono) || ch.chrono.length !== 4) errors.push(`${where} : "chrono" doit contenir exactement 4 événements.`);
      if (!ch.short || !ch.short.q || !ch.short.a) errors.push(`${where} : "short" doit contenir "q" et "a".`);
    });
  }
  return { ok: errors.length === 0, errors };
}

        <div className="stat-tile">

                <div className="book-info">

                  <p className="book-author">{book.author}</p>
                  <p className="book-tagline">{book.tagline}</p>
                  <div className="book-progress-row">
                    <div className="progress-track small">

          />
          <button className="btn-primary" disabled={!importBookText.trim()} onClick={handleImportBook}>
            Importer ce livre

          {importBookErrors.length > 0 && (
            <div className="import-errors">

        <button className="btn-ghost small" onClick={() => { setShowExport((v) => !v); setShowImport(false); }}>
          💾 Exporter mes données
        </button>
        <button className="btn-ghost small" onClick={() => { setShowImport((v) => !v); setShowExport(false); }}>
          📥 Importer mes données
        </button>

      {showExport && (
        <div className="data-box">
          <p>
            Copie tout ce texte avant de republier une mise à jour de l'application — tu pourras le recoller
            avec « Importer mes données » sur la nouvelle page pour retrouver ta progression.
          </p>
          <textarea ref={exportRef} className="data-textarea" readOnly value={JSON.stringify(progress)} rows={4} onFocus={(e) => e.target.select()} />
          <button className="btn-secondary" onClick={handleCopy}>Copier</button>
          {copied && <span className="data-msg success">Copié ✓</span>}
        </div>
      )}

      {showImport && (
        <div className="data-box">
          <p>Colle ici le texte exporté depuis ton ancienne page pour retrouver ta progression :</p>
          <textarea
            className="data-textarea"
            value={importText}
            onChange={(e) => setImportText(e.target.value)}
            rows={4}
            placeholder='{"tour80":{"1":{"score":14,"max":16,"date":...}}}'
          />
          <button className="btn-primary" disabled={!importText.trim()} onClick={handleImport}>Importer</button>
          {importMsg && <span className={"data-msg " + (importMsg.includes("succès") ? "success" : "error")}>{importMsg}</span>}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   ÉCRAN : CARTE DU VOYAGE (par livre)
   ============================================================ */
function JourneyMap({ book, progress, onOpenChapter, onBack }) {
  const bp = progress[book.id] || {};
  const chapters = book.chapters;
  const positions = useMemo(() => getNodePositions(chapters.length), [chapters.length]);
  const pathPoints = positions.map((p) => `${p.x},${p.y}`).join(" ");

  const doneCount = Object.keys(bp).length;
  const totalScore = Object.values(bp).reduce((s, c) => s + (c.score || 0), 0);
  const maxScore = chapters.length * MAX_PER_CHAPTER;
  let nextChapter = chapters.find((c) => !bp[c.num]);
  if (!nextChapter) nextChapter = null;

  return (
    <div className="screen journey">
      <div className="journey-header">
        <button className="btn-ghost" onClick={onBack}>← Bibliothèque</button>
        <div className="journey-title">
          <h1>{book.title}</h1>
          <p>{doneCount}/{chapters.length} chapitres lus &nbsp;·&nbsp; {totalScore}/{maxScore} points</p>
        </div>
        <div className="journey-stats-ring">
          <svg viewBox="0 0 36 36" className="ring-svg">
            <path className="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
            <path
              className="ring-fg"
              strokeDasharray={`${(doneCount / chapters.length) * 100}, 100`}
              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
            />
          </svg>
          <span className="ring-label">{Math.round((doneCount / chapters.length) * 100)}%</span>
        </div>
      </div>

      <div className="map-wrap">
        <svg viewBox="0 0 100 96" className="map-path-svg" preserveAspectRatio="none">
          <polyline points={pathPoints} className="map-path-line" />
        </svg>

        {(book.bands || []).map((b) => {
          const p = positions[b.start - 1];
          if (!p) return null;
          return (
            <div key={b.label} className="map-band-marker" style={{ left: p.x + "%", top: p.y - 6.4 + "%" }} title={b.label}>
              <span>{b.emoji}</span>
            </div>
          );
        })}

        {chapters.map((ch, idx) => {
          const p = positions[idx];
          const entry = bp[ch.num];
          const isNext = nextChapter && nextChapter.num === ch.num;
          const stars = entry ? starsForScore(entry.score, MAX_PER_CHAPTER) : 0;
          let cls = "map-node";
          if (entry) cls += stars >= 2 ? " node-done-high" : " node-done-low";
          if (isNext) cls += " node-next";
          return (
            <button
              key={ch.num}
              className={cls}
              style={{ left: p.x + "%", top: p.y + "%" }}
              onClick={() => onOpenChapter(ch.num)}
              title={"Chapitre " + ch.num + " — " + ch.title}
            >
              <span className="map-node-num">{ch.num}</span>
              {entry && (
                <span className="map-node-stars">
                  {"⭐".repeat(stars)}
                  {stars === 0 ? "•" : ""}
                </span>
              )}
            </button>
          );
        })}
      </div>

      <p className="map-legend">
        <span><i className="dot dot-todo" /> à lire</span>
        <span><i className="dot dot-low" /> à revoir</span>
        <span><i className="dot dot-high" /> réussi</span>
        <span><i className="dot dot-next" /> prochain chapitre</span>
      </p>
    </div>
  );
}

/* ============================================================
   ÉCRAN : QUIZ D'UN CHAPITRE
   ============================================================ */
function ChapterQuiz({ book, chapterNum, onExit, onComplete }) {
  const ch = book.chapters.find((c) => c.num === chapterNum);
  const [step, setStep] = useState("intro"); // intro | qcm | vf | chrono | short | result

  const [qcmAnswers, setQcmAnswers] = useState(Array(4).fill(null));
  const [qcmLocked, setQcmLocked] = useState(false);

  const [vfAnswers, setVfAnswers] = useState(Array(4).fill(null));
  const [vfLocked, setVfLocked] = useState(false);

  const shuffledChrono = useMemo(() => shuffleArray(ch.chrono), [ch]);
  const [chronoOrder, setChronoOrder] = useState([]); // sequence of original-shuffled-array indices tapped
  const [chronoLocked, setChronoLocked] = useState(false);

  const [shortText, setShortText] = useState("");
  const [shortRevealed, setShortRevealed] = useState(false);
  const [shortScore, setShortScore] = useState(null);

  const qcmScore = qcmAnswers.reduce((s, a, i) => s + (a === ch.qcm[i].correct ? 1 : 0), 0);
  const vfScore = vfAnswers.reduce((s, a, i) => s + (a === ch.vf[i].correct ? 1 : 0), 0);
  const chronoScore = chronoOrder.reduce((s, origIdx, pos) => s + (shuffledChrono[origIdx].i === pos ? 1 : 0), 0);
  const totalScore = qcmScore + vfScore + chronoScore + (shortScore || 0);

  const steps = ["qcm", "vf", "chrono", "short"];
  const stepIdx = steps.indexOf(step);

  function toggleChronoTap(shuffledIdx) {
    if (chronoLocked) return;
    if (chronoOrder.includes(shuffledIdx)) {
      setChronoOrder(chronoOrder.filter((x) => x !== shuffledIdx));
    } else if (chronoOrder.length < 4) {
      setChronoOrder([...chronoOrder, shuffledIdx]);
    }
  }

  function finishChapter() {
    onComplete(chapterNum, totalScore, MAX_PER_CHAPTER);
    setStep("result");
  }

  if (step === "intro") {
    return (
      <div className="screen quiz">
        <div className="quiz-topbar">
          <button className="btn-ghost" onClick={onExit}>← Carte</button>
        </div>
        <div className="intro-card">
          <div className="intro-stamp">CHAPITRE {ch.num}</div>
          <h1>{ch.title}</h1>
          <div className="intro-meta">
            <span>⏱ {ch.time} de lecture</span>
            <span>{"★".repeat(ch.diff)}{"☆".repeat(3 - ch.diff)}</span>
            <span>{vehicleForChapter(book, ch.num)}</span>
          </div>
          <p className="intro-instructions">
            Lis d'abord le chapitre {ch.num} dans ton livre. Quand tu es prêt, réponds aux questions
            pour gagner jusqu'à <strong>16 points</strong> !
          </p>
          <button className="btn-primary large" onClick={() => setStep("qcm")}>
            J'ai lu le chapitre — Commencer le quiz 🚀
          </button>
        </div>
      </div>
    );
  }

  if (step === "result") {
    const stars = starsForScore(totalScore, MAX_PER_CHAPTER);
    const msg = pick(ENCOURAGEMENTS[stars]);
    return (
      <div className="screen quiz result-screen">
        <Confetti show={stars >= 2} />
        <div className="result-card">
          <div className="result-vehicle">{vehicleForChapter(book, ch.num)}</div>
          <h1>Chapitre {ch.num} terminé !</h1>
          <div className="result-stars">
            {[1, 2, 3].map((n) => (
              <span key={n} className={n <= stars ? "star filled" : "star"}>★</span>
            ))}
          </div>
          <p className="result-score">{totalScore} / {MAX_PER_CHAPTER} points</p>
          <p className="result-msg">{msg}</p>
          <div className="result-breakdown">
            <div><span>QCM</span><b>{qcmScore}/4</b></div>
            <div><span>Vrai/Faux</span><b>{vfScore}/4</b></div>
            <div><span>Chronologie</span><b>{chronoScore}/4</b></div>
            <div><span>Réponse courte</span><b>{shortScore || 0}/4</b></div>
          </div>
          <div className="result-actions">
            <button className="btn-secondary" onClick={onExit}>Retour à la carte</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="screen quiz">
      <div className="quiz-topbar">
        <button className="btn-ghost" onClick={onExit}>← Carte</button>
        <div className="quiz-dots">
          {steps.map((s, i) => (
            <span key={s} className={"quiz-dot" + (i === stepIdx ? " active" : i < stepIdx ? " done" : "")} />
          ))}
        </div>
        <div className="quiz-score-pill">{qcmScore + vfScore + chronoScore + (shortScore || 0)} pts</div>
      </div>

      <div className="quiz-chapter-label">Chapitre {ch.num} — {ch.title}</div>

      {step === "qcm" && (
        <div className="quiz-section">
          <h2>1. Compréhension</h2>
          {ch.qcm.map((item, qi) => (
            <div key={qi} className="q-card">
              <p className="q-text">{item.q}</p>
              <div className="q-options">
                {item.options.map((opt, oi) => {
                  let cls = "q-option";
                  if (qcmLocked) {
                    if (oi === item.correct) cls += " correct";
                    else if (oi === qcmAnswers[qi]) cls += " wrong";
                  } else if (qcmAnswers[qi] === oi) {
                    cls += " selected";
                  }
                  return (
                    <button
                      key={oi}
                      className={cls}
                      disabled={qcmLocked}
                      onClick={() => {
                        const next = [...qcmAnswers];
                        next[qi] = oi;
                        setQcmAnswers(next);
                      }}
                    >
                      {opt}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
          <SectionFooter
            locked={qcmLocked}
            canValidate={qcmAnswers.every((a) => a !== null)}
            onValidate={() => setQcmLocked(true)}
            onNext={() => setStep("vf")}
          />
        </div>
      )}

      {step === "vf" && (
        <div className="quiz-section">
          <h2>2. Vrai ou Faux</h2>
          {ch.vf.map((item, vi) => (
            <div key={vi} className="vf-card">
              <p className="q-text">{item.s}</p>
              <div className="vf-buttons">
                {[true, false].map((val) => {
                  let cls = "vf-btn " + (val ? "vf-true" : "vf-false");
                  if (vfLocked) {
                    if (val === item.correct) cls += " correct";
                    else if (val === vfAnswers[vi]) cls += " wrong";
                  } else if (vfAnswers[vi] === val) {
                    cls += " selected";
                  }
                  return (
                    <button
                      key={String(val)}
                      className={cls}
                      disabled={vfLocked}
                      onClick={() => {
                        const next = [...vfAnswers];
                        next[vi] = val;
                        setVfAnswers(next);
                      }}
                    >
                      {val ? "Vrai" : "Faux"}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
          <SectionFooter
            locked={vfLocked}
            canValidate={vfAnswers.every((a) => a !== null)}
            onValidate={() => setVfLocked(true)}
            onNext={() => setStep("chrono")}
          />
        </div>
      )}

      {step === "chrono" && (
        <div className="quiz-section">
          <h2>3. Chronologie</h2>
          <p className="hint">Touche les événements dans l'ordre (1 = premier, 4 = dernier).</p>
          {shuffledChrono.map((item, si) => {
            const tapPos = chronoOrder.indexOf(si);
            let cls = "chrono-card";
            if (chronoLocked) {
              cls += item.i === tapPos ? " correct" : " wrong";
            } else if (tapPos !== -1) {
              cls += " selected";
            }
            return (
              <button key={si} className={cls} disabled={chronoLocked} onClick={() => toggleChronoTap(si)}>
                <span className="chrono-badge">{tapPos !== -1 ? tapPos + 1 : ""}</span>
                <span>{item.v}</span>
                {chronoLocked && <span className="chrono-correct-pos">(place réelle : {item.i + 1})</span>}
              </button>
            );
          })}
          {!chronoLocked && (
            <button className="btn-ghost small" onClick={() => setChronoOrder([])}>
              ↺ Recommencer l'ordre
            </button>
          )}
          <SectionFooter
            locked={chronoLocked}
            canValidate={chronoOrder.length === 4}
            onValidate={() => setChronoLocked(true)}
            onNext={() => setStep("short")}
          />
        </div>
      )}

      {step === "short" && (
        <div className="quiz-section">
          <h2>4. Réponse courte</h2>
          <div className="q-card">
            <p className="q-text">{ch.short.q}</p>
            <textarea
              className="short-textarea"
              placeholder="Écris ta réponse ici (facultatif)…"
              value={shortText}
              onChange={(e) => setShortText(e.target.value)}
              disabled={shortRevealed}
              rows={3}
            />
            {!shortRevealed ? (
              <button className="btn-secondary" onClick={() => setShortRevealed(true)}>
                Voir la réponse suggérée
              </button>
            ) : (
              <div className="short-answer-box">
                <p><strong>Réponse suggérée :</strong> {ch.short.a}</p>
                {shortScore === null ? (
                  <div className="self-assess">
                    <p>Compare avec ta réponse, puis choisis honnêtement :</p>
                    <div className="self-assess-buttons">
                      <button className="btn-self good" onClick={() => setShortScore(4)}>👍 J'ai bien répondu (4 pts)</button>
                      <button className="btn-self mid" onClick={() => setShortScore(2)}>🤔 Presque (2 pts)</button>
                      <button className="btn-self low" onClick={() => setShortScore(0)}>📖 À revoir (0 pt)</button>
                    </div>
                  </div>
                ) : (
                  <p className="self-assess-done">Tu t'es attribué {shortScore}/4 points.</p>
                )}
              </div>
            )}
          </div>
          <div className="section-footer">
            <button className="btn-primary large" disabled={shortScore === null} onClick={finishChapter}>
              Voir mon score du chapitre 🏆
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function SectionFooter({ locked, canValidate, onValidate, onNext }) {
  return (
    <div className="section-footer">
      {!locked ? (
        <button className="btn-primary" disabled={!canValidate} onClick={onValidate}>
          Valider cette section
        </button>
      ) : (
        <button className="btn-primary" onClick={onNext}>
          Continuer →
        </button>
      )}
    </div>
  );
}

/* ============================================================
   APPLICATION PRINCIPALE
   ============================================================ */
function App() {
  const [loading, setLoading] = useState(true);
  const [progress, setProgress] = useState({});
  const [customBooks, setCustomBooks] = useState([]);
  const [view, setView] = useState({ screen: "library", bookId: null, chapterNum: null });

  useEffect(() => {
    (async () => {
      const [p, cb] = await Promise.all([loadProgress(), loadCustomBooks()]);
      setProgress(p);
      setCustomBooks(cb);
      setLoading(false);
    })();
  }, []);

  const allBooks = useMemo(() => [...BOOKS, ...customBooks], [customBooks]);

  async function handleComplete(chapterNum, score, max) {
    setProgress((prev) => {
      const bookId = view.bookId;
      const next = { ...prev, [bookId]: { ...(prev[bookId] || {}) } };
      next[bookId][chapterNum] = { score, max, date: Date.now() };
      saveProgress(next);
      return next;
    });
  }

  function handleImportProgress(importedData) {
    setProgress((prev) => {
      const merged = mergeProgress(prev, importedData);
      saveProgress(merged);
      return merged;
    });
  }

  function handleImportBook(bookPackage) {
    setCustomBooks((prev) => {
      const next = [...prev, bookPackage];
      saveCustomBooks(next);
      return next;
    });
  }

  function handleDeleteCustomBook(bookId) {
    setCustomBooks((prev) => {
      const next = prev.filter((b) => b.id !== bookId);
      saveCustomBooks(next);
      return next;
    });
  }

  const book = view.bookId ? allBooks.find((b) => b.id === view.bookId) : null;

  return (
    <div className="app-root">
      <style>{CSS}</style>
      {loading ? (
        <div className="loading-screen">
          <div className="loading-spinner">🧭</div>
          <p>Chargement de ta progression…</p>
        </div>
      ) : view.screen === "library" ? (
        <LibraryScreen
          books={allBooks}
          progress={progress}
          onOpenBook={(bookId) => setView({ screen: "map", bookId, chapterNum: null })}
          onImportProgress={handleImportProgress}
          onImportBook={handleImportBook}
          onDeleteCustomBook={handleDeleteCustomBook}
          customBookIds={customBooks.map((b) => b.id)}
        />
      ) : view.screen === "map" ? (
        <JourneyMap
          book={book}
          progress={progress}
          onOpenChapter={(chapterNum) => setView({ screen: "quiz", bookId: view.bookId, chapterNum })}
          onBack={() => setView({ screen: "library", bookId: null, chapterNum: null })}
        />
      ) : (
        <ChapterQuiz
          book={book}
          chapterNum={view.chapterNum}
          onExit={() => setView({ screen: "map", bookId: view.bookId, chapterNum: null })}
          onComplete={handleComplete}
        />
      )}
    </div>
  );
}

* { box-sizing: border-box; }
.app-root {
  font-family: var(--body-font);
  color: var(--ink);
  background: var(--cream);
  background-image:
    radial-gradient(circle at 20% 20%, rgba(184,135,59,0.08) 0%, transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(46,110,118,0.08) 0%, transparent 45%);
  min-height: 100vh;
  width: 100%;
  padding: 0;
}
.screen { max-width: 900px; margin: 0 auto; padding: 24px 18px 60px; }
button { font-family: var(--body-font); cursor: pointer; }

.loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:12px; }
.loading-spinner { font-size: 40px; animation: spin 2s linear infinite; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

/* ---------- Library ---------- */
.library-hero { text-align:center; margin-bottom: 28px; }
.stamp-badge {
  display:inline-block; font-family: var(--mono-font); font-size:11px; letter-spacing:2px;
  color: var(--terracotta); border: 2px solid var(--terracotta); border-radius: 3px;
  padding: 3px 10px; transform: rotate(-2deg); margin-bottom: 10px;
}
.hero-title { font-family: var(--display-font); font-size: 34px; margin: 6px 0; color: var(--ink); }
.hero-sub { color: var(--ink-light); margin: 0; }

.stats-panel {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
  gap: 10px;
  margin: 0 0 26px;
}
.stat-tile {
  background: var(--white);
  border: 1px solid var(--cream-dark);
  border-radius: 12px;
  padding: 12px 8px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  box-shadow: 0 2px 0 var(--cream-dark);
}
.stat-tile.stat-streak { background: linear-gradient(160deg, #FCEFDD, var(--white)); border-color: var(--brass); }
.stat-icon { font-size: 20px; line-height: 1; margin-bottom: 4px; }
.stat-label-flag { display: inline-flex; align-items: center; justify-content: center; gap: 4px; }
.stat-value { font-family: var(--mono-font); font-weight: bold; font-size: 18px; color: var(--ink); line-height: 1.1; }
.stat-label { font-size: 10px; color: var(--ink-light); margin-top: 2px; letter-spacing: 0.2px; text-transform: uppercase; }

.book-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 20px; }
.book-card {
  background: var(--white); border: 1px solid var(--cream-dark); border-radius: 14px;
  padding: 18px; text-align:left; display:flex; flex-direction:column; gap: 10px;
  box-shadow: 0 3px 0 var(--cream-dark); transition: transform .15s ease, box-shadow .15s ease;
}
.book-card:not(.placeholder):hover { transform: translateY(-3px); box-shadow: 0 8px 16px rgba(30,58,63,0.15); }
.book-cover {
  height: 110px; border-radius: 10px; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg, var(--accent, var(--ocean)), var(--accent2, var(--brass)));
}
.book-cover-emoji { font-size: 46px; }
.book-cover svg { width: 100%; height: 100%; }
.book-info h2 { font-family: var(--display-font); font-size: 20px; margin: 0; }
.book-author { margin: 2px 0; font-style: italic; color: var(--ink-light); font-size: 13px; }
.book-tagline { margin: 0 0 6px; font-size: 13px; color: var(--ink-light); }
.book-progress-row { display:flex; align-items:center; gap:8px; }
.progress-track { flex:1; height: 8px; background: var(--cream-dark); border-radius: 6px; overflow:hidden; }
.progress-track.small { height: 6px; }
.progress-fill { height:100%; background: linear-gradient(90deg, var(--sage), var(--ocean)); border-radius:6px; }
.progress-label { font-size: 11px; color: var(--ink-light); white-space:nowrap; }
.book-score { margin: 2px 0 0; font-size: 13px; font-family: var(--mono-font); }
.book-cta { margin-top: 6px; font-weight: bold; color: var(--ocean); }
.book-card.placeholder { align-items:center; justify-content:center; text-align:center; border-style: dashed; color: var(--ink-light); background: transparent; box-shadow:none; }
.placeholder-plus { font-size: 30px; color: var(--cream-dark); border: 2px dashed var(--cream-dark); border-radius:50%; width:50px; height:50px; display:flex; align-items:center; justify-content:center; }

.book-card-wrap { position: relative; }
.book-delete {
  position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border: 1px solid var(--cream-dark);
  border-radius: 50%; width: 28px; height: 28px; font-size: 13px; display:flex; align-items:center; justify-content:center;
  color: var(--terracotta); z-index: 2;
}
.import-errors { margin-top: 6px; max-height: 160px; overflow-y: auto; }

.data-tools { display:flex; gap: 16px; justify-content:center; margin-top: 30px; flex-wrap: wrap; }
.data-box { max-width: 480px; margin: 12px auto 0; background: var(--white); border: 1px dashed var(--cream-dark); border-radius: 12px; padding: 14px 16px; }
.data-box p { font-size: 12px; color: var(--ink-light); margin: 0 0 8px; }
.data-textarea { width:100%; font-family: var(--mono-font); font-size: 11px; border: 1px solid var(--cream-dark); border-radius: 8px; padding: 8px; margin-bottom: 8px; resize: vertical; }
.data-msg { margin-left: 10px; font-size: 12px; font-weight: bold; }
.data-msg.success { color: var(--sage); }
.data-msg.error { color: var(--terracotta); }

/* ---------- Journey Map ---------- */
.journey-header { display:flex; align-items:center; gap:16px; margin-bottom: 10px; flex-wrap: wrap; }
.journey-title { flex:1; min-width: 180px; }
.journey-title h1 { font-family: var(--display-font); font-size: 24px; margin:0; }
.journey-title p { margin: 2px 0 0; font-size: 13px; color: var(--ink-light); font-family: var(--mono-font); }
.journey-stats-ring { position:relative; width:52px; height:52px; }
.ring-svg { width:52px; height:52px; transform: rotate(-90deg); }
.ring-bg { fill:none; stroke: var(--cream-dark); stroke-width:3; }
.ring-fg { fill:none; stroke: var(--sage); stroke-width:3; stroke-linecap: round; }
.ring-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; }

.btn-ghost { background:none; border: none; color: var(--ocean); font-weight:bold; padding: 6px 4px; }
.btn-ghost.small { font-size: 12px; }

.map-wrap { position: relative; width:100%; aspect-ratio: 100/96; background: var(--white); border-radius: 16px; border: 1px solid var(--cream-dark); margin: 14px 0; overflow: hidden; }
.map-path-svg { position:absolute; inset:0; width:100%; height:100%; }
.map-path-line { fill:none; stroke: var(--cream-dark); stroke-width: 1.4; stroke-dasharray: 2 2; }

.map-band-marker { position:absolute; transform: translate(-50%,-50%); font-size: 16px; opacity:0.85; pointer-events:none; }

.map-node {
  position:absolute; transform: translate(-50%,-50%); width: 34px; height:34px; border-radius:50%;
  background: var(--cream-dark); border: 2px solid var(--white); box-shadow: 0 0 0 1px var(--ink-light);
  display:flex; flex-direction:column; align-items:center; justify-content:center; font-size: 12px; font-weight:bold; color: var(--ink);
  padding:0;
}
.map-node-num { line-height:1; }
.map-node-stars { font-size: 6px; line-height:1; margin-top:1px; }
.node-done-high { background: var(--sage); border-color: var(--sage); color: white; box-shadow: 0 0 0 1px var(--sage); }
.node-done-low { background: var(--brass); border-color: var(--brass); color: white; box-shadow: 0 0 0 1px var(--brass); }
.node-next { box-shadow: 0 0 0 3px rgba(190,90,58,0.4); animation: pulse 1.6s infinite; }
@keyframes pulse { 0%,100%{ box-shadow: 0 0 0 3px rgba(190,90,58,0.35);} 50%{ box-shadow: 0 0 0 7px rgba(190,90,58,0.12);} }

.map-legend { display:flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--ink-light); }
.dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; }
.dot-todo { background: var(--cream-dark); }
.dot-low { background: var(--brass); }
.dot-high { background: var(--sage); }
.dot-next { background: var(--terracotta); }

/* ---------- Quiz ---------- */
.quiz-topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 6px; }
.quiz-dots { display:flex; gap:6px; }
.quiz-dot { width:8px; height:8px; border-radius:50%; background: var(--cream-dark); }
.quiz-dot.active { background: var(--terracotta); }
.quiz-dot.done { background: var(--sage); }
.quiz-score-pill { font-family: var(--mono-font); background: var(--ink); color: var(--white); padding:4px 10px; border-radius: 20px; font-size:12px; }
.quiz-chapter-label { font-size: 12px; color: var(--ink-light); margin-bottom: 14px; font-family: var(--mono-font); }

.intro-card { background: var(--white); border: 1px solid var(--cream-dark); border-radius: 16px; padding: 30px 24px; text-align:center; margin-top: 20px; }
.intro-stamp { display:inline-block; font-family: var(--mono-font); font-size:12px; letter-spacing:2px; border: 2px solid var(--ink); color: var(--ink); border-radius: 4px; padding: 4px 12px; margin-bottom: 12px; transform: rotate(-1.5deg); }
.intro-card h1 { font-family: var(--display-font); font-size: 26px; margin: 6px 0 14px; }
.intro-meta { display:flex; gap:16px; justify-content:center; font-size: 14px; color: var(--brass); margin-bottom: 16px; flex-wrap:wrap; }
.intro-instructions { color: var(--ink-light); max-width: 440px; margin: 0 auto 22px; line-height:1.5; }

.btn-primary { background: var(--ocean); color: white; border:none; border-radius: 10px; padding: 10px 20px; font-weight:bold; font-size:14px; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary.large { font-size:16px; padding: 14px 26px; border-radius: 12px; }
.btn-secondary { background: var(--cream-dark); color: var(--ink); border:none; border-radius: 10px; padding: 9px 16px; font-weight:bold; font-size:13px; }

.quiz-section h2 { font-family: var(--display-font); font-size: 20px; margin: 6px 0 14px; }
.hint { font-size: 13px; color: var(--ink-light); margin-top:-8px; margin-bottom: 12px; }

.q-card, .vf-card { background: var(--white); border: 1px solid var(--cream-dark); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.q-text { font-weight: bold; margin: 0 0 10px; }
.q-options { display:flex; flex-direction:column; gap:8px; }
.q-option { text-align:left; background: var(--cream); border: 1.5px solid var(--cream-dark); border-radius: 8px; padding: 9px 12px; font-size: 14px; }
.q-option.selected { border-color: var(--ocean); background: #E4F0F1; }
.q-option.correct { border-color: var(--sage); background: #E4F1E7; font-weight:bold; }
.q-option.wrong { border-color: var(--terracotta); background: #F6E4DE; text-decoration: line-through; }

.vf-buttons { display:flex; gap:10px; }
.vf-btn { flex:1; border-radius:8px; padding: 9px; font-weight:bold; border: 1.5px solid var(--cream-dark); background: var(--cream); }
.vf-btn.selected { border-color: var(--ocean); background:#E4F0F1; }
.vf-btn.correct { border-color: var(--sage); background:#E4F1E7; }
.vf-btn.wrong { border-color: var(--terracotta); background:#F6E4DE; text-decoration: line-through; }

.chrono-card { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background: var(--white); border: 1.5px solid var(--cream-dark); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; font-size: 14px; }
.chrono-card.selected { border-color: var(--ocean); background:#E4F0F1; }
.chrono-card.correct { border-color: var(--sage); background:#E4F1E7; }
.chrono-card.wrong { border-color: var(--terracotta); background:#F6E4DE; }
.chrono-badge { min-width: 22px; height:22px; border-radius:50%; background: var(--ink); color:white; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.chrono-correct-pos { margin-left:auto; font-size: 11px; color: var(--ink-light); font-family: var(--mono-font); white-space:nowrap; }

.short-textarea { width:100%; border: 1.5px solid var(--cream-dark); border-radius: 8px; padding: 10px; font-family: var(--body-font); font-size: 14px; margin: 8px 0 12px; resize: vertical; }
.short-answer-box { background: var(--cream); border-radius: 10px; padding: 12px 14px; margin-top: 10px; }
.self-assess-buttons { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
.btn-self { border:none; border-radius: 8px; padding: 9px 12px; font-weight:bold; text-align:left; font-size:13px; }
.btn-self.good { background:#E4F1E7; color: var(--sage); }
.btn-self.mid { background:#F6EEDC; color: var(--brass); }
.btn-self.low { background:#F6E4DE; color: var(--terracotta); }
.self-assess-done { font-weight:bold; color: var(--sage); }

.section-footer { display:flex; justify-content:flex-end; margin-top: 8px; margin-bottom: 30px; }

/* ---------- Result ---------- */
.result-screen { position: relative; }
.result-card { background: var(--white); border: 1px solid var(--cream-dark); border-radius: 18px; padding: 34px 24px; text-align:center; margin-top: 24px; }
.result-vehicle { font-size: 44px; margin-bottom: 6px; }
.result-card h1 { font-family: var(--display-font); font-size: 24px; margin: 4px 0 10px; }
.result-stars { font-size: 34px; color: var(--cream-dark); margin-bottom: 6px; }
.result-stars .star.filled { color: var(--brass); }
.result-score { font-family: var(--mono-font); font-size: 20px; font-weight:bold; margin: 4px 0; }
.result-msg { color: var(--ink-light); margin-bottom: 18px; }
.result-breakdown { display:grid; grid-template-columns: repeat(2,1fr); gap:10px; max-width: 320px; margin: 0 auto 22px; }
.result-breakdown div { background: var(--cream); border-radius: 8px; padding: 8px; font-size: 12px; display:flex; justify-content:space-between; }
.result-actions { display:flex; justify-content:center; gap: 10px; }

.confetti-layer { position: fixed; inset:0; pointer-events:none; overflow:hidden; z-index: 50; }
.confetti-piece { position:absolute; top:-30px; animation-name: fall; animation-timing-function: ease-in; animation-fill-mode: forwards; }
@keyframes fall { to { transform: translateY(110vh) rotate(300deg); opacity: 0.2; } }

@media (max-width: 480px) {
  .hero-title { font-size: 26px; }
  .map-node { width: 28px; height: 28px; font-size: 10px; }
}
`;

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
  // Manually transform the JSX source instead of relying on Babel's
  // automatic <script type="text/babel"> scanning: recent @babel/preset-react
  // defaults to the "automatic" JSX runtime, which injects an
  // `import { jsx as _jsx } from "react/jsx-runtime"` statement into the
  // OUTPUT even when the input has none — and that import statement is
  // exactly what breaks a plain, non-module <script>. Forcing the
  // classic runtime here avoids that entirely.
  const source = document.getElementById("app-source").textContent;
  const { code } = Babel.transform(source, {
    presets: [["react", { runtime: "classic" }]],
  });
  const script = document.createElement("script");
  script.textContent = code;
  document.body.appendChild(script);
</script>
</body>
</html>
